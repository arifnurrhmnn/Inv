<script>
function shareInvitation(buttonElement) {

  const row = buttonElement.closest('tr');
  const guestName = row.querySelector('.guest-name').value;

  const encodedName = encodeURIComponent(guestName).replace(/%20/g, '+');
  const invitationUrl = `https://inviding.id/dina-arif/?to=${encodedName}`;

  const text = `Assalamu’alaikum Wr. Wb.

Yth. Bapak/Ibu/Saudara/i
*${guestName}*

Dengan memohon rahmat dan ridho Allah SWT, tanpa mengurangi rasa hormat, kami sekeluarga bermaksud mengundang Bapak/Ibu/Saudara/i untuk hadir pada acara pernikahan putra/putri kami:

*Dina Reidina Risdiani, S.M*
*&*
*Arif Nur Rohman, S.Kom*

Untuk informasi lengkap mengenai rangkaian acara, lokasi, dan detail lainnya, silakan mengakses tautan undangan berikut:

_${invitationUrl}_

Mohon kesediaannya untuk melakukan konfirmasi kehadiran melalui fitur RSVP pada link undangan tersebut.

Kehadiran dan doa restu Bapak/Ibu/Saudara/i merupakan kebahagiaan bagi kami, serta mohon maaf apabila undangan disampaikan secara digital.

Terima kasih atas perhatian dan kehadirannya.

Wassalamu’alaikum Wr. Wb.`;

  if (navigator.share) {
    navigator.share({
      title: 'Undangan Pernikahan',
      text: text
    });
  } else {
    window.open(
      'https://wa.me/?text=' + encodeURIComponent(text),
      '_blank'
    );
  }
}

function addGuestRow() {
  const tbody = document.getElementById('guestTableBody');
  const rowCount = tbody.rows.length + 1;

  const row = document.createElement('tr');

  row.innerHTML = `
    <td>${rowCount}</td>
    <td>
      <input type="text" class="guest-name" placeholder="Masukkan nama tamu"
        style="width:100%; padding:8px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">
    </td>
    <td>
      <button onclick="shareInvitation(this)">Bagikan</button>
    </td>
  `;

  tbody.appendChild(row);
}

document.getElementById('searchInput').addEventListener('keyup', function () {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll('#guestTableBody tr');

  rows.forEach(row => {
    const input = row.querySelector('.guest-name');
    const text = input.value.toLowerCase();

    if (text.includes(filter)) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
});
</script>
