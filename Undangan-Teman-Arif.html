<script>

function searchGuest() {
  const input = document.getElementById('searchInput').value.toLowerCase();
  const rows = document.querySelectorAll('#guestTableBody tr');

  rows.forEach((row) => {
    const guestInput = row.querySelector('.guest-input');
    const guestName = guestInput.value.toLowerCase();

    if (guestName.includes(input)) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
}

function shareInvitation(buttonElement) {

  const row = buttonElement.closest('tr');
  const guestName = row.querySelector('.guest-input').value;

  const safeGuestName = guestName.replace(/&/g, 'dan');

  const encodedName = encodeURIComponent(safeGuestName)
    .replace(/%20/g, '+');

  const invitationUrl = `https://inviding.id/dina-arif/?to=${encodedName}`;

  const text = `Assalamu’alaikum Wr. Wb.

Yth. Bapak/Ibu/Saudara/i
*${guestName}*

Dengan memohon rahmat dan ridho Allah SWT, tanpa mengurangi rasa hormat, kami bermaksud mengundang Bapak/Ibu/Saudara/i untuk hadir pada acara pernikahan kami:

*Dina Reidina Risdiani*
*&*
*Arif Nur Rohman*

Untuk informasi lengkap mengenai rangkaian acara, lokasi, dan detail lainnya, silakan mengakses tautan undangan berikut:

${invitationUrl}

Kehadiran dan doa restu Bapak/Ibu/Saudara/i merupakan kebahagiaan bagi kami, serta mohon maaf apabila undangan disampaikan secara digital.

Terima kasih atas perhatian dan kehadirannya.

Wassalamu’alaikum Wr. Wb.`;

  if (navigator.share) {
    navigator.share({
      title: 'Undangan Pernikahan',
      text: text
    });
  } else {
    window.open(
      'https://wa.me/?text=' + encodeURIComponent(text),
      '_blank'
    );
  }
}

function addGuestRow() {

  const tableBody = document.getElementById('guestTableBody');
  const rowCount = tableBody.rows.length + 1;

  const newRow = `
    <tr>
      <td>${rowCount}</td>
      <td>
        <input type="text" value="" class="guest-input" placeholder="Nama tamu">
      </td>
      <td>
        <button onclick="shareInvitation(this)">Bagikan</button>
      </td>
    </tr>
  `;

  tableBody.insertAdjacentHTML('beforeend', newRow);
}

</script>
